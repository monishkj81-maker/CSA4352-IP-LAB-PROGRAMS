<!DOCTYPE html>
<html>
<head>
<title>EasyToll</title>
<style>
body{font-family:Arial;background:#eef}
.card{background:white;padding:20px;margin:20px}
button{background:orange;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Registration</h2>
<input type="text" placeholder="Name"><br><br>
<input type="text" placeholder="Vehicle Number"><br><br>
<button>Register</button>
</div>

<div class="card">
<h2>Add Money</h2>
<input type="number" placeholder="Amount"><br><br>
<button>Add Money</button>
</div>

<div class="card">
<h2>Apply Toll Pass</h2>
<button>Apply</button>
</div>

<div class="card">
<h2>QR Code Status</h2>
<p>QR Generated Successfully</p>
</div>

<div class="card">
<h2>Toll Verification</h2>
<input type="text" placeholder="Pass ID"><br><br>
<button>Verify</button>
</div>

</body>
</html>
