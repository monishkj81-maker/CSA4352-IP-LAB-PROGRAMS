<!DOCTYPE html>
<html>
<head>
<title>Home Finder</title>
<style>
body{font-family:Arial;background:#f2f2f2}
.card{background:white;padding:20px;margin:20px;border-radius:10px}
button{padding:10px;background:#0066cc;color:white;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Buyer Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Search Property</h2>
<input type="text" placeholder="Location"><br><br>
<input type="number" placeholder="Budget"><br><br>
<button>Search</button>
</div>

<div class="card">
<h2>Property Details</h2>
<p>2BHK Apartment - Chennai</p>
<p>Price: ₹45 Lakhs</p>
</div>

<div class="card">
<h2>Agent Details</h2>
<p>Agent: Kumar</p>
<p>Contact: 9876543210</p>
</div>

</body>
</html>
