<!DOCTYPE html>
<html>
<head>
<title>Beauty Parlour</title>
<style>
body{font-family:Arial;background:#fff5ee}
.card{background:white;padding:20px;margin:20px}
button{background:purple;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Customer Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Select Service</h2>
<select>
<option>Hair Cut</option>
<option>Facial</option>
<option>Makeup</option>
</select>
</div>

<div class="card">
<h2>Book Appointment</h2>
<input type="date">
<input type="time">
<button>Book</button>
</div>

<div class="card">
<h2>Appointment History</h2>
<p>Hair Cut - Confirmed</p>
</div>

</body>
</html>
