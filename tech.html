<!DOCTYPE html>
<html>
<head>
<title>Electronics Store</title>
<style>
body{font-family:Arial;background:#f5f5f5}
.card{background:white;padding:20px;margin:20px}
button{background:blue;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Login</h2>
<input type="email" placeholder="Email"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Products</h2>
<p>Laptop - ₹65000</p>
<p>Smartphone - ₹30000</p>
<p>Tablet - ₹25000</p>
</div>

<div class="card">
<h2>Shopping Cart</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<h2>Checkout</h2>
<button>Buy Now</button>
</div>

</body>
</html>
