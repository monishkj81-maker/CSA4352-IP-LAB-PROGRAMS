<!DOCTYPE html>
<html>
<head>
<title>VetCure</title>
<style>
body{font-family:Arial;background:#f6fff2}
.card{background:white;padding:20px;margin:20px}
button{background:#2d6a4f;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Farmer Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Post Animal Complaint</h2>
<textarea placeholder="Animal symptoms"></textarea><br><br>
<button>Submit Complaint</button>
</div>

<div class="card">
<h2>Doctor Details</h2>
<p>Dr. Kumar</p>
<p>Veterinary Specialist</p>
</div>

<div class="card">
<h2>Payment</h2>
<button>Pay Consultation Fee</button>
</div>

<div class="card">
<h2>Doctor Solution</h2>
<p>Medicine prescribed successfully.</p>
</div>

</body>
</html>
