<!DOCTYPE html>
<html>
<head>
<title>AgriMart</title>
<style>
body{font-family:Arial;background:#f0fff0}
.card{background:white;padding:20px;margin:20px}
button{background:green;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Farmer Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Add Product</h2>
<input type="text" placeholder="Product Name"><br><br>
<input type="number" placeholder="Price"><br><br>
<button>Add Product</button>
</div>

<div class="card">
<h2>Available Products</h2>
<p>Seeds - ₹500</p>
<p>Fertilizer - ₹750</p>
</div>

<div class="card">
<h2>Order Product</h2>
<button>Place Order</button>
</div>

</body>
</html>
