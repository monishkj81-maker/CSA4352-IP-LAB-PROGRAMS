<!DOCTYPE html>
<html>
<head>
<title>RentRide</title>
<style>
body{font-family:Arial;background:#f5f5f5}
.card{background:white;padding:20px;margin:20px}
button{background:#0d3b66;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Search Vehicle</h2>
<input type="text" placeholder="Location"><br><br>
<button>Search</button>
</div>

<div class="card">
<h2>Available Vehicles</h2>
<p>Hyundai Creta - ₹2500/day</p>
<p>Maruti Swift - ₹1800/day</p>
</div>

<div class="card">
<h2>Book Vehicle</h2>
<input type="date"><br><br>
<button>Book Now</button>
</div>

<div class="card">
<h2>Booking Status</h2>
<p>Status: Approved</p>
</div>

</body>
</html>
