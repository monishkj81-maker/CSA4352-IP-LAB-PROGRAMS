<!DOCTYPE html>
<html>
<head>
<title>Hotel Booking</title>
<style>
body{font-family:Arial;background:#eef}
.card{background:white;padding:20px;margin:20px;border-radius:10px}
button{padding:10px;background:blue;color:white;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Registration</h2>
<input type="text" placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>
<button>Register</button>
</div>

<div class="card">
<h2>Search Rooms</h2>
<input type="date">
<input type="number" placeholder="Guests">
<button>Search</button>
</div>

<div class="card">
<h2>Room Details</h2>
<p>Deluxe Room - ₹2500</p>
<p>AC Room - ₹3500</p>
</div>

<div class="card">
<h2>Book Room</h2>
<button>Book Now</button>
</div>

<div class="card">
<h2>Booking History</h2>
<p>Room 101 - Confirmed</p>
</div>

</body>
</html>
