<!DOCTYPE html>
<html>
<head>
<title>ReNewMarket</title>
<style>
body{font-family:Arial;background:#f5f5f5}
.card{background:white;padding:20px;margin:20px}
button{background:#444;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Registration</h2>
<input type="text" placeholder="Name"><br><br>
<button>Register</button>
</div>

<div class="card">
<h2>Add Product</h2>
<input type="text" placeholder="Product Name"><br><br>
<input type="number" placeholder="Price"><br><br>
<button>Add Product</button>
</div>

<div class="card">
<h2>Product List</h2>
<p>Used Laptop - ₹25000</p>
<p>Used Mobile - ₹8000</p>
</div>

<div class="card">
<h2>Order Status</h2>
<p>Shipped</p>
</div>

</body>
</html>
