<!DOCTYPE html>
<html>
<head>
<title>Bus Booking</title>
<style>
body{font-family:Arial;background:#f5f5f5}
.card{background:white;padding:20px;margin:20px}
button{padding:10px;background:red;color:white;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Search Bus</h2>
<input type="text" placeholder="From">
<input type="text" placeholder="To">
<button>Search</button>
</div>

<div class="card">
<h2>Available Buses</h2>
<p>Volvo AC - ₹800</p>
<p>Sleeper - ₹950</p>
</div>

<div class="card">
<h2>Book Ticket</h2>
<input type="text" placeholder="Passenger Name">
<button>Book</button>
</div>

<div class="card">
<h2>Booking History</h2>
<p>Chennai → Madurai</p>
</div>

</body>
</html>
