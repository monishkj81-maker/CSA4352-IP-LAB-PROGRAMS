<!DOCTYPE html>
<html>
<head>
<title>InsureEasy</title>
<style>
body{font-family:Arial;background:#eef}
.card{background:white;padding:20px;margin:20px}
button{background:green;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Policy Details</h2>
<p>Health Insurance</p>
<p>Premium: ₹15000</p>
</div>

<div class="card">
<h2>Premium Payment</h2>
<button>Pay Premium</button>
</div>

<div class="card">
<h2>SMS Alert</h2>
<p>Policy Renewal Reminder</p>
</div>

</body>
</html>
