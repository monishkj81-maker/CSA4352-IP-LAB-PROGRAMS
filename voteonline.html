<!DOCTYPE html>
<html>
<head>
<title>VoteOnline</title>
<style>
body{font-family:Arial;background:#eef}
.card{background:white;padding:20px;margin:20px}
button{background:green;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Voter Login</h2>
<input type="text" placeholder="Voter ID"><br><br>
<button>Get OTP</button>
</div>

<div class="card">
<h2>OTP Verification</h2>
<input type="text" placeholder="Enter OTP"><br><br>
<button>Verify</button>
</div>

<div class="card">
<h2>Select Candidate</h2>
<select>
<option>Candidate 1</option>
<option>Candidate 2</option>
</select><br><br>
<button>Submit Vote</button>
</div>

<div class="card">
<h2>Election Result</h2>
<p>Results Available After Election.</p>
</div>

</body>
</html>
