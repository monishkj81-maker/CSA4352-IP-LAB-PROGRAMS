<!DOCTYPE html>
<html>
<head>
<title>Hospital Appointment</title>
<style>
body{font-family:Arial;background:#f0f8ff}
.card{background:white;padding:20px;margin:20px}
button{background:green;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Patient Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Search Doctor</h2>
<input type="text" placeholder="Specialization">
<button>Search</button>
</div>

<div class="card">
<h2>Doctor Details</h2>
<p>Dr. Kumar - Cardiologist</p>
<p>Dr. Priya - Dermatologist</p>
</div>

<div class="card">
<h2>Book Appointment</h2>
<input type="date">
<input type="time">
<button>Book</button>
</div>

</body>
</html>
