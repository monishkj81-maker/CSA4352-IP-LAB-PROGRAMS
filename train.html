<!DOCTYPE html>
<html>
<head>
<title>Train Reservation</title>
<style>
body{font-family:Arial;background:#eef}
.card{background:white;padding:20px;margin:20px}
button{padding:10px;background:green;color:white;border:none}
</style>
</head>
<body>

<div class="card">
<h2>Passenger Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Search Train</h2>
<input type="text" placeholder="Source">
<input type="text" placeholder="Destination">
<button>Search</button>
</div>

<div class="card">
<h2>Available Trains</h2>
<p>Express Train - Sleeper</p>
<p>Superfast - AC Coach</p>
</div>

<div class="card">
<h2>Book Ticket</h2>
<input type="text" placeholder="Passenger Name">
<button>Reserve</button>
</div>

<div class="card">
<h2>PNR Status</h2>
<input type="text" placeholder="Enter PNR">
<button>Check</button>
</div>

</body>
</html>
