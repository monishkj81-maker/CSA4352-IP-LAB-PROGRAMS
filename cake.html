<!DOCTYPE html>
<html>
<head>
<title>Cake Ordering System</title>
<style>
body{font-family:Arial;background:#fff0f5}
.card{background:white;padding:20px;margin:20px;border-radius:10px}
button{background:#ff69b4;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Registration</h2>
<input type="text" placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>
<button>Register</button>
</div>

<div class="card">
<h2>Available Cakes</h2>
<p>Chocolate Cake - ₹500</p>
<p>Vanilla Cake - ₹450</p>
<p>Black Forest - ₹700</p>
</div>

<div class="card">
<h2>Customize Cake</h2>
<input type="text" placeholder="Cake Message"><br><br>
<select>
<option>1 Kg</option>
<option>2 Kg</option>
</select>
</div>

<div class="card">
<h2>Order Cake</h2>
<button>Place Order</button>
</div>

</body>
</html>
