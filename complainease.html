<!DOCTYPE html>
<html>
<head>
<title>ComplainEase</title>
<style>
body{font-family:Arial;background:#f4f4f4}
.card{background:white;padding:20px;margin:20px;border-radius:10px}
button{background:red;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Login</h2>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button>Login</button>
</div>

<div class="card">
<h2>Post Complaint</h2>
<textarea placeholder="Enter complaint"></textarea><br><br>
<button>Submit</button>
</div>

<div class="card">
<h2>Complaint Status</h2>
<p>Status: In Progress</p>
</div>

<div class="card">
<h2>Feedback</h2>
<textarea placeholder="Feedback"></textarea><br><br>
<button>Submit Feedback</button>
</div>

</body>
</html>
