<!DOCTYPE html>
<html>
<head>
<title>StyleHub</title>
<style>
body{font-family:Arial;background:#faf0e6}
.card{background:white;padding:20px;margin:20px}
button{background:black;color:white;padding:10px;border:none}
</style>
</head>
<body>

<div class="card">
<h2>User Registration</h2>
<input type="text" placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>
<button>Register</button>
</div>

<div class="card">
<h2>Fashion Products</h2>
<p>Men's Jacket - ₹2500</p>
<p>Women's Dress - ₹1800</p>
<p>Sneakers - ₹3000</p>
</div>

<div class="card">
<h2>Size Selection</h2>
<select>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>
</div>

<div class="card">
<h2>Shopping Cart</h2>
<button>Add to Cart</button>
</div>

<div class="card">
<h2>Checkout</h2>
<button>Place Order</button>
</div>

</body>
</html>
